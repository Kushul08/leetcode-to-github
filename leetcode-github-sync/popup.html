<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LeetCode → GitHub Sync</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #0d1117;
      color: #c9d1d9;
      padding: 0;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #f89820, #e05d44);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }

    header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #f0f6fc;
      line-height: 1.2;
    }
    header p {
      font-size: 11px;
      color: #8b949e;
      margin-top: 2px;
    }

    main {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 12px;
      font-weight: 500;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    input {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #f0f6fc;
      font-size: 13px;
      padding: 7px 10px;
      outline: none;
      transition: border-color .15s;
      width: 100%;
    }
    input:focus { border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88,166,255,.12); }
    input::placeholder { color: #484f58; }

    .hint {
      font-size: 11px;
      color: #8b949e;
      margin-top: -2px;
    }
    .hint a { color: #58a6ff; text-decoration: none; }
    .hint a:hover { text-decoration: underline; }

    .divider {
      border: none;
      border-top: 1px solid #21262d;
    }

    .row { display: flex; gap: 10px; }
    .row .field { flex: 1; }

    .btn-save {
      background: #238636;
      border: 1px solid #2ea043;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 0;
      transition: background .15s;
      width: 100%;
    }
    .btn-save:hover { background: #2ea043; }
    .btn-save:active { transform: scale(0.98); }

    #status {
      font-size: 12px;
      text-align: center;
      min-height: 18px;
      transition: opacity .3s;
    }
    #status.ok  { color: #3fb950; }
    #status.err { color: #f85149; }

    .stats {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .stat-val  { font-size: 20px; font-weight: 600; color: #f0f6fc; }
    .stat-lbl  { font-size: 11px; color: #8b949e; margin-top: 2px; }

    footer {
      border-top: 1px solid #21262d;
      padding: 10px 16px;
      font-size: 11px;
      color: #484f58;
      text-align: center;
    }
    footer a { color: #58a6ff; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <div class="logo">⚡</div>
    <div>
      <h1>LeetCode → GitHub</h1>
      <p>Auto-push accepted solutions</p>
    </div>
  </header>

  <main>
    <!-- Push count -->
    <div class="stats">
      <div>
        <div class="stat-val" id="push-count">0</div>
        <div class="stat-lbl">Solutions pushed</div>
      </div>
      <div style="text-align:right">
        <div class="stat-val" id="last-push">—</div>
        <div class="stat-lbl">Last push</div>
      </div>
    </div>

    <hr class="divider" />

    <!-- GitHub token -->
    <div class="field">
      <label>GitHub Personal Access Token</label>
      <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
      <p class="hint">
        <a href="https://github.com/settings/tokens/new?scopes=repo&description=LeetCode+Sync" target="_blank">
          Generate token
        </a>
        — needs <code>repo</code> scope
      </p>
    </div>

    <!-- Repo -->
    <div class="field">
      <label>Repository</label>
      <input type="text" id="repo" placeholder="username/leetcode-solutions" />
      <p class="hint">Must already exist on GitHub</p>
    </div>

    <!-- Branch + Base path -->
    <div class="row">
      <div class="field">
        <label>Branch</label>
        <input type="text" id="branch" placeholder="main" />
      </div>
      <div class="field">
        <label>Base folder</label>
        <input type="text" id="basePath" placeholder="solutions" />
      </div>
    </div>

    <button class="btn-save" id="save">Save settings</button>
    <div id="status"></div>
  </main>

  <footer>
    Files saved as <code>solutions/&lt;difficulty&gt;/&lt;number&gt;-&lt;slug&gt;.&lt;ext&gt;</code>
  </footer>

  <script src="src/popup.js"></script>
</body>
</html>
